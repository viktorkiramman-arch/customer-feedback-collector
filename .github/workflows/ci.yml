name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: feedback_collector
          POSTGRES_USER: feedback
          POSTGRES_PASSWORD: feedback
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feedback -d feedback_collector"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://feedback:feedback@localhost:5432/feedback_collector?schema=public
      NEXTAUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
      NEXTAUTH_URL: http://127.0.0.1:3000
      IP_HASH_SECRET: ci-ip-hash-secret-at-least-16
      TRUST_PROXY_HEADERS: "false"
      DEMO_MODE: "true"
      DEMO_ADMIN_EMAIL: owner@example.com
      DEMO_ADMIN_PASSWORD: ChangeMe123!
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
